# PostgreSQL + pgvector for the RAG backend
# Usage:
#   docker compose up -d          # Start the database
#   docker compose down           # Stop and remove the container
#   docker compose logs -f        # Follow logs

services:
  postgres:
    # pgvector is PostgreSQL + the pgvector extension pre-installed
    image: pgvector/pgvector:pg17
    container_name: rag-postgres
    restart: unless-stopped
    ports:
      # Maps host port 5432 to container port 5432 (default PostgreSQL port)
      - "5435:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag_db
    volumes:
      # Persists database data so it survives container restarts
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
